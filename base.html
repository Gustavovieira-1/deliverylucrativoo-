<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel VSL — Delivery Lucrativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #E8220A; --orange: #FF6B00; --dark: #0D0D0D; --panel: #161616; --card: #1E1E1E; --border: #2A2A2A; --text: #F0F0F0; --muted: #888; --green: #22C55E; }
    body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 10px; }
    .badge { background: linear-gradient(135deg, var(--red), var(--orange)); border-radius: 5px; padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; border: none; transition: .15s; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, var(--red), var(--orange)); color: #fff; }
    .btn-primary:hover { opacity: .9; }
    .btn-save { background: var(--green); color: #fff; font-size: 14px; padding: 11px 28px; }
    .btn-save:hover { opacity: .9; }
    .container { max-width: 680px; margin: 0 auto; padding: 36px 20px 120px; }
    .tip { background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.2); border-radius: 8px; padding: 14px 18px; font-size: 13px; color: #bbb; line-height: 1.6; margin-bottom: 28px; }
    .tip strong { color: var(--green); }
    .section-label { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .field input { background: #111; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 10px 14px; width: 100%; transition: border-color .15s; }
    .field input:focus { outline: none; border-color: var(--orange); }
    .field small { font-size: 11px; color: #555; }
    .preview-box { position: relative; border-radius: 8px; overflow: hidden; background: #000; border: 1px solid #333; margin-bottom: 16px; display: none; }
    .preview-box::before { content: ''; display: block; padding-top: 56.25%; }
    .preview-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .preview-label { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: none; }
    .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); border-top: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; z-index: 200; }
    .save-status { font-size: 13px; color: var(--muted); }
    .save-status.ok { color: var(--green); font-weight: 600; }
    .save-status.warn { color: var(--orange); font-weight: 600; }
    .save-status.erro { color: #f87171; font-weight: 600; }
    .toast { position: fixed; bottom: 80px; right: 24px; background: var(--green); color: #fff; font-weight: 700; font-size: 14px; padding: 12px 22px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.4); transform: translateY(80px); opacity: 0; transition: .3s cubic-bezier(.34,1.56,.64,1); z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.erro { background: #dc2626; }
  </style>
</head>
<body>

<header>
  <div class="logo"><span class="badge">ADMIN</span> Painel VSL</div>
  <a class="btn btn-primary" href="index.html" target="_blank">👁 Ver VSL ao Vivo</a>
</header>

<div class="container">
  <div class="tip">
    ✅ Agora salva no <strong>Supabase</strong>: preencha os campos → clique <strong>💾 Salvar</strong> → a VSL atualiza em qualquer navegador!
  </div>

  <div class="section-label">🎬 Vídeo</div>
  <div class="field">
    <label>Link ou ID do vídeo no YouTube</label>
    <input type="text" id="videoId" placeholder="Ex: https://www.youtube.com/watch?v=dQw4w9WgXcQ" oninput="onInput('videoId'); atualizarPreview()">
    <small>Cole o link completo do YouTube ou só o ID do vídeo</small>
  </div>
  <div class="preview-label" id="preview-label">Preview do Vídeo</div>
  <div class="preview-box" id="preview-box">
    <iframe id="preview-iframe" allowfullscreen></iframe>
  </div>

  <div class="section-label">✍️ Textos</div>
  <div class="field">
    <label>Barra de urgência (topo)</label>
    <input type="text" id="topbar" oninput="onInput()" placeholder="🔥 ATENÇÃO: Vagas Limitadas...">
  </div>
  <div class="field">
    <label>Título linha 1 (fica em laranja/dourado)</label>
    <input type="text" id="linha1" oninput="onInput()" placeholder="Descubra Como Faturar R$1.000">
  </div>
  <div class="field">
    <label>Título linha 2</label>
    <input type="text" id="linha2" oninput="onInput()" placeholder="Por Dia com Delivery">
  </div>

  <div class="section-label">🛒 Botão</div>
  <div class="field">
    <label>Texto do botão</label>
    <input type="text" id="btnTexto" oninput="onInput()" placeholder="QUERO FATURAR R$1.000 POR DIA →">
  </div>
  <div class="field">
    <label>Link da Kiwify (URL completa)</label>
    <input type="url" id="btnLink" oninput="onInput()" placeholder="https://pay.kiwify.com.br/SEU_LINK">
  </div>
  <div class="field">
    <label>Nota abaixo do botão</label>
    <input type="text" id="btnNota" oninput="onInput()" placeholder="🔒 Compra 100% segura · Acesso imediato após pagamento">
  </div>
  <div class="field">
    <label>Botão aparece após quantos segundos?</label>
    <input type="number" id="segundos" oninput="onInput()" value="5" min="1" max="999">
  </div>
</div>

<div class="save-bar">
  <span class="save-status" id="save-status">Carregando...</span>
  <button class="btn btn-save" id="btn-salvar" onclick="salvar()">💾 Salvar Agora</button>
</div>
<div class="toast" id="toast"></div>

<script>
  var SB_URL  = 'https://oijcggqfcgjkgcaymjqx.supabase.co';
  var SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pamNnZ3FmY2dqa2djYXltanF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDE0NzcsImV4cCI6MjA4ODMxNzQ3N30.URV7NROQ0wAGG_GzrS2yn2Kksxaefy4v4JJ49yRW51A';

  function v(id) { return document.getElementById(id).value; }

  function ytId(input) {
    if (!input) return null;
    input = input.trim();
    var m = input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    if (m) return m[1];
    if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
    return null;
  }

  function onInput() {
    setStatus('warn', '⚠️ Alterações não salvas — clique em 💾 Salvar');
  }

  function atualizarPreview() {
    var id  = ytId(v('videoId'));
    var box = document.getElementById('preview-box');
    var lbl = document.getElementById('preview-label');
    var ifr = document.getElementById('preview-iframe');
    if (id) {
      ifr.src = 'https://www.youtube.com/embed/' + id + '?rel=0&modestbranding=1';
      box.style.display = 'block'; lbl.style.display = 'block';
    } else {
      ifr.src = ''; box.style.display = 'none'; lbl.style.display = 'none';
    }
  }

  function setStatus(tipo, msg) {
    var el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status ' + (tipo || '');
  }

  async function sbFetch(method, body) {
    var res = await fetch(SB_URL + '/rest/v1/vsl_config?id=eq.1', {
      method: method,
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': method === 'GET' ? '' : 'return=minimal'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error('Supabase erro ' + res.status);
    if (method === 'GET') return res.json();
  }

  async function carregar() {
    try {
      setStatus('', 'Carregando...');
      var rows = await sbFetch('GET');
      if (!rows || !rows.length) { setStatus('', 'Nenhuma configuração salva ainda.'); return; }
      var c = rows[0];
      if (c.topbar)     document.getElementById('topbar').value     = c.topbar;
      if (c.linha1)     document.getElementById('linha1').value     = c.linha1;
      if (c.linha2)     document.getElementById('linha2').value     = c.linha2;
      if (c.btn_texto)  document.getElementById('btnTexto').value   = c.btn_texto;
      if (c.btn_link)   document.getElementById('btnLink').value    = c.btn_link;
      if (c.btn_nota)   document.getElementById('btnNota').value    = c.btn_nota;
      if (c.video_id)   { document.getElementById('videoId').value  = c.video_id; atualizarPreview(); }
      if (c.segundos)   document.getElementById('segundos').value   = c.segundos;
      setStatus('ok', '✅ Configurações carregadas do Supabase.');
    } catch(e) {
      setStatus('erro', '❌ Erro ao carregar: ' + e.message);
    }
  }

  async function salvar() {
    var rawVideo = v('videoId').trim();
    if (rawVideo && !ytId(rawVideo)) { toast('⚠️ Link do YouTube inválido!', true); return; }

    var btn = document.getElementById('btn-salvar');
    btn.disabled = true; btn.textContent = '⏳ Salvando...';
    setStatus('', 'Salvando no Supabase...');

    try {
      await sbFetch('PATCH', {
        topbar:        v('topbar'),
        linha1:        v('linha1'),
        linha2:        v('linha2'),
        btn_texto:     v('btnTexto'),
        btn_link:      v('btnLink'),
        btn_nota:      v('btnNota'),
        video_id:      rawVideo,
        segundos:      parseInt(v('segundos')) || 5,
        atualizado_em: new Date().toISOString()
      });
      setStatus('ok', '✅ Salvo no Supabase! VSL atualizada em todos os dispositivos.');
      toast('✅ Salvo! A VSL já está atualizada.');
    } catch(e) {
      setStatus('erro', '❌ Erro ao salvar: ' + e.message);
      toast('❌ Erro ao salvar!', true);
    } finally {
      btn.disabled = false; btn.textContent = '💾 Salvar Agora';
    }
  }

  function toast(msg, erro) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (erro ? ' erro' : '');
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3500);
  }

  carregar();
</script>
</body>
</html>
