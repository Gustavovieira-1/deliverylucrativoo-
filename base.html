<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel VSL — Delivery Lucrativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #E8220A; --orange: #FF6B00; --dark: #0D0D0D; --panel: #161616; --card: #1E1E1E; --border: #2A2A2A; --text: #F0F0F0; --muted: #888; --green: #22C55E; }
    body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 10px; }
    .badge { background: linear-gradient(135deg, var(--red), var(--orange)); border-radius: 5px; padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; border: none; transition: .15s; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, var(--red), var(--orange)); color: #fff; }
    .btn-primary:hover { opacity: .9; }
    .btn-save { background: var(--green); color: #fff; font-size: 14px; padding: 11px 28px; }
    .btn-save:hover { opacity: .9; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }

    .container { max-width: 680px; margin: 0 auto; padding: 36px 20px 60px; }

    .tip {
      background: rgba(34,197,94,0.07);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13px;
      color: #bbb;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .tip strong { color: var(--green); }

    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--orange);
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .field input {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      width: 100%;
      transition: border-color .15s;
    }
    .field input:focus { outline: none; border-color: var(--orange); }
    .field small { font-size: 11px; color: #555; }

    .preview-box {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      border: 1px solid #333;
      margin-bottom: 16px;
      display: none;
    }
    .preview-box::before { content: ''; display: block; padding-top: 56.25%; }
    .preview-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .preview-label { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }

    .save-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      z-index: 200;
    }
    .save-status { font-size: 13px; color: var(--muted); }
    .save-status.ok { color: var(--green); font-weight: 600; }
    .save-status.warn { color: var(--orange); }

    .toast {
      position: fixed; bottom: 80px; right: 24px;
      background: var(--green); color: #fff;
      font-weight: 700; font-size: 14px;
      padding: 12px 22px; border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transform: translateY(80px); opacity: 0;
      transition: .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    .pb { padding-bottom: 100px; }
  </style>
</head>
<body>

<header>
  <div class="logo"><span class="badge">ADMIN</span> Painel VSL</div>
  <a class="btn btn-primary" href="index.html" target="_blank">👁 Ver VSL ao Vivo</a>
</header>

<div class="container pb">

  <div class="tip">
    ✅ Agora é <strong>direto</strong>: preencha os campos → clique <strong>💾 Salvar</strong> → a VSL atualiza automaticamente. Sem GitHub, sem copiar código!
  </div>

  <!-- VÍDEO -->
  <div class="section-label">🎬 Vídeo</div>
  <div class="field">
    <label>Link ou ID do vídeo no YouTube</label>
    <input type="text" id="videoId" placeholder="Ex: https://www.youtube.com/watch?v=dQw4w9WgXcQ" oninput="atualizarPreview()">
    <small>Cole o link completo do YouTube ou só o ID do vídeo</small>
  </div>
  <div class="preview-label" id="preview-label" style="display:none;">Preview do Vídeo</div>
  <div class="preview-box" id="preview-box">
    <iframe id="preview-iframe" allowfullscreen></iframe>
  </div>

  <!-- TEXTOS -->
  <div class="section-label">✍️ Textos</div>
  <div class="field">
    <label>Barra de urgência (topo)</label>
    <input type="text" id="topbar" value="🔥 ATENÇÃO: Vagas Limitadas — Garanta Sua Entrada Agora!">
  </div>
  <div class="field">
    <label>Título linha 1 (fica em laranja/dourado)</label>
    <input type="text" id="linha1" value="Descubra Como Faturar R$1.000">
  </div>
  <div class="field">
    <label>Título linha 2</label>
    <input type="text" id="linha2" value="Por Dia com Delivery">
  </div>

  <!-- BOTÃO -->
  <div class="section-label">🛒 Botão</div>
  <div class="field">
    <label>Texto do botão</label>
    <input type="text" id="btnTexto" value="QUERO FATURAR R$1.000 POR DIA →">
  </div>
  <div class="field">
    <label>Link da Kiwify (URL completa)</label>
    <input type="url" id="btnLink" placeholder="https://pay.kiwify.com.br/SEU_LINK">
  </div>
  <div class="field">
    <label>Nota abaixo do botão</label>
    <input type="text" id="btnNota" value="🔒 Compra 100% segura · Acesso imediato após pagamento">
  </div>
  <div class="field">
    <label>Botão aparece após quantos segundos?</label>
    <input type="number" id="segundos" value="5" min="1" max="999">
  </div>

</div>

<!-- BARRA DE SALVAR FIXA -->
<div class="save-bar">
  <span class="save-status" id="save-status">Carregando configurações...</span>
  <button class="btn btn-save" onclick="salvar()">💾 Salvar Agora</button>
</div>

<div class="toast" id="toast"></div>

<script>
  function v(id) { return document.getElementById(id).value; }

  function ytId(input) {
    if (!input) return null;
    input = input.trim();
    var m = input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    if (m) return m[1];
    if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
    return null;
  }

  function atualizarPreview() {
    var input = v('videoId');
    var id = ytId(input);
    var box = document.getElementById('preview-box');
    var lbl = document.getElementById('preview-label');
    var iframe = document.getElementById('preview-iframe');
    if (id) {
      iframe.src = 'https://www.youtube.com/embed/' + id + '?rel=0&modestbranding=1';
      box.style.display = 'block';
      lbl.style.display = 'block';
    } else {
      iframe.src = '';
      box.style.display = 'none';
      lbl.style.display = 'none';
    }
    setStatus('warn', 'Alterações não salvas — clique em 💾 Salvar');
  }

  function setStatus(tipo, msg) {
    var el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status ' + (tipo || '');
  }

  // Marca campos como alterados
  document.addEventListener('DOMContentLoaded', function() {
    var inputs = document.querySelectorAll('input');
    inputs.forEach(function(inp) {
      inp.addEventListener('input', function() {
        if (inp.id !== 'videoId') setStatus('warn', 'Alterações não salvas — clique em 💾 Salvar');
      });
    });
  });

  function salvar() {
    var rawVideo = v('videoId').trim();
    if (rawVideo && !ytId(rawVideo)) {
      toast('⚠️ Link do YouTube inválido!');
      return;
    }
    var cfg = {
      topbar:   v('topbar'),
      linha1:   v('linha1'),
      linha2:   v('linha2'),
      btnTexto: v('btnTexto'),
      btnLink:  v('btnLink'),
      btnNota:  v('btnNota'),
      videoId:  rawVideo,
      segundos: parseInt(v('segundos')) || 5
    };
    localStorage.setItem('vsl_config', JSON.stringify(cfg));
    setStatus('ok', '✅ Salvo! A VSL já está atualizada.');
    toast('✅ Configurações salvas! Abra a VSL para ver.');
  }

  // Carrega configurações salvas ao abrir
  (function() {
    var raw = localStorage.getItem('vsl_config');
    if (!raw) { setStatus('', 'Nenhuma configuração salva ainda.'); return; }
    try {
      var cfg = JSON.parse(raw);
      if (cfg.topbar)   document.getElementById('topbar').value   = cfg.topbar;
      if (cfg.linha1)   document.getElementById('linha1').value   = cfg.linha1;
      if (cfg.linha2)   document.getElementById('linha2').value   = cfg.linha2;
      if (cfg.btnTexto) document.getElementById('btnTexto').value = cfg.btnTexto;
      if (cfg.btnLink)  document.getElementById('btnLink').value  = cfg.btnLink;
      if (cfg.btnNota)  document.getElementById('btnNota').value  = cfg.btnNota;
      if (cfg.videoId)  { document.getElementById('videoId').value = cfg.videoId; atualizarPreview(); }
      if (cfg.segundos) document.getElementById('segundos').value = cfg.segundos;
      setStatus('ok', '✅ Configurações carregadas.');
    } catch(e) {
      setStatus('', 'Erro ao carregar configurações.');
    }
  })();

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3500);
  }
</script>
</body>
</html>
