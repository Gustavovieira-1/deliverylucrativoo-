<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descubra Como Faturar R$1.000 Por Dia com Delivery</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #E8220A; --orange: #FF6B00; --gold: #FFD700; --dark: #0A0A0A; }
    html, body { height: 100%; background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
    .topbar { background: linear-gradient(90deg, var(--red), var(--orange)); text-align: center; padding: 9px 16px; font-weight: 700; font-size: 13px; letter-spacing: 0.3px; animation: pulse-bar 2s ease-in-out infinite; }
    @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:.85} }
    .hero { text-align: center; padding: 28px 20px 16px; }
    .hero h1 { font-weight: 900; font-size: clamp(24px, 4.5vw, 48px); line-height: 1.15; color: #fff; }
    .hero h1 span { background: linear-gradient(90deg, var(--orange), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .video-section { max-width: 820px; margin: 0 auto; padding: 16px 16px 0; }
    .video-wrapper { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 0 60px rgba(232,34,10,0.4), 0 0 120px rgba(255,107,0,0.15); border: 2px solid rgba(255,107,0,0.35); background: #000; }
    .video-wrapper::before { content: ''; display: block; padding-top: 56.25%; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .cta-wrap { text-align: center; padding: 28px 20px 40px; display: none; animation: fadeUp .6s ease forwards; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .btn-cta { display: inline-block; background: linear-gradient(135deg, var(--red), var(--orange)); color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: clamp(16px, 2.5vw, 22px); text-decoration: none; padding: 20px 52px; border-radius: 6px; letter-spacing: 0.3px; animation: glow-btn 2.2s ease-in-out infinite; transition: transform .15s; }
    @keyframes glow-btn { 0%,100%{box-shadow:0 8px 32px rgba(255,107,0,0.45)} 50%{box-shadow:0 8px 52px rgba(255,107,0,0.8),0 0 80px rgba(232,34,10,0.35)} }
    .btn-cta:hover { transform: translateY(-2px) scale(1.02); }
    .cta-note { margin-top: 12px; font-size: 12px; color: #777; font-weight: 600; }
    @media(max-width:600px){ .btn-cta{ padding:18px 28px; width:100%; max-width:340px; } }
  </style>
</head>
<body>

<div class="topbar">🔥 ATENÇÃO: Vagas Limitadas — Garanta Sua Entrada Agora!</div>

<section class="hero">
  <h1><span>Descubra Como Faturar R$1.000</span><br>Por Dia com Delivery</h1>
</section>

<section class="video-section">
  <div class="video-wrapper">
    <iframe
      src="https://www.youtube.com/embed/watch?v=LLCxCnZaB0c&t=36s?rel=0&modestbranding=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</section>

<div class="cta-wrap" id="cta">
  <a class="btn-cta" href="https://pay.kiwify.com.br/SEU_LINK" target="_blank">QUERO FATURAR R$1.000 POR DIA →</a>
  <p class="cta-note">🔒 Compra 100% segura · Acesso imediato após pagamento</p>
</div>

<script>
  setTimeout(function() {
    var cta = document.getElementById('cta');
    cta.style.display = 'block';
    cta.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 5000);
</script>

</body>
</html>
