<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSL</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #E8220A; --orange: #FF6B00; --gold: #FFD700; --dark: #0A0A0A; }
    html, body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

    .topbar {
      background: linear-gradient(90deg, var(--red), var(--orange));
      text-align: center; padding: 9px 16px; font-weight: 700; font-size: 13px;
      animation: pulse-bar 2s ease-in-out infinite;
    }
    @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:.85} }

    .hero { text-align: center; padding: 28px 20px 16px; }
    .hero h1 {
      font-weight: 900;
      font-size: clamp(22px, 4vw, 46px);
      line-height: 1.2;
      background: linear-gradient(90deg, var(--orange), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .video-section { max-width: 820px; margin: 0 auto; padding: 16px 16px 0; }
    .video-wrapper {
      position: relative; border-radius: 8px; overflow: hidden;
      box-shadow: 0 0 60px rgba(232,34,10,0.4), 0 0 120px rgba(255,107,0,0.15);
      border: 2px solid rgba(255,107,0,0.35); background: #000;
    }
    .video-wrapper::before { content: ''; display: block; padding-top: 56.25%; }

    #yt-iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
      /* Expande o iframe para esconder a barra de controles do YouTube embaixo */
      width: 100%; height: 130%;
      top: -15%; 
    }

    /* Bloqueador de cliques — fica sempre em cima do iframe */
    .video-block {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 20; cursor: default;
    }

    /* Cover preto com thumbnail — some quando vídeo inicia */
    .play-cover {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; background: #000;
      transition: opacity 0.5s ease;
    }
    .play-cover.hide { opacity: 0; pointer-events: none; }

    .play-cover .thumb {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0.5;
    }

    /* Botão de som — aparece no canto depois que o vídeo começa (mutado) */
    .unmute-btn {
      position: absolute; bottom: 14px; right: 14px; z-index: 25;
      background: rgba(0,0,0,0.75); border: 2px solid var(--orange);
      color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 700;
      font-size: 13px; padding: 8px 14px; border-radius: 6px; cursor: pointer;
      display: none; align-items: center; gap: 6px;
      animation: pulse-sound 1.5s ease-in-out infinite;
    }
    .unmute-btn.show { display: flex; }
    @keyframes pulse-sound {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,107,0,0.5); }
      50%      { box-shadow: 0 0 0 6px rgba(255,107,0,0); }
    }

    .spinner {
      position: relative; z-index: 2;
      width: 60px; height: 60px; border: 5px solid rgba(255,107,0,0.2);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .cta-wrap {
      text-align: center; padding: 28px 20px 40px;
      display: none; animation: fadeUp .6s ease forwards;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .btn-cta {
      display: inline-block;
      background: linear-gradient(135deg, var(--red), var(--orange));
      color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: clamp(15px, 2.5vw, 22px); text-decoration: none;
      padding: 20px 40px; border-radius: 6px;
      animation: glow-btn 2.2s ease-in-out infinite; transition: transform .15s;
    }
    @keyframes glow-btn {
      0%,100%{box-shadow:0 8px 32px rgba(255,107,0,0.45)}
      50%{box-shadow:0 8px 52px rgba(255,107,0,0.8),0 0 80px rgba(232,34,10,0.35)}
    }
    .btn-cta:hover { transform: translateY(-2px) scale(1.02); }
    .cta-note { margin-top: 12px; font-size: 12px; color: #777; font-weight: 600; }

    @media(max-width:600px){
      .btn-cta { padding: 18px 24px; width: 100%; max-width: 340px; }
    }
  </style>
</head>
<body>

<div class="topbar" id="vsl-topbar">🔥 ATENÇÃO: Vagas Limitadas — Garanta Sua Entrada Agora!</div>

<section class="hero">
  <h1 id="vsl-titulo">Descubra Como Faturar R$1.000<br>Por Dia com Delivery</h1>
</section>

<section class="video-section">
  <div class="video-wrapper">
    <iframe id="yt-iframe"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
      playsinline></iframe>

    <!-- Bloqueador sempre presente — impede pause/seek/clique no player -->
    <div class="video-block"></div>

    <!-- Botão de ativar som — aparece após autoplay mudo iniciar -->
    <div class="unmute-btn" id="unmute-btn" onclick="ativarSom()">
      🔇 Toque para ativar o som
    </div>

    <!-- Cover com thumbnail e spinner enquanto carrega -->
    <div class="play-cover" id="play-cover">
      <img class="thumb" id="thumb-img" src="" alt="">
      <div class="spinner"></div>
    </div>
  </div>
</section>

<div class="cta-wrap" id="cta">
  <a class="btn-cta" id="vsl-btn" href="#" target="_blank">QUERO FATURAR R$1.000 POR DIA →</a>
  <p class="cta-note" id="vsl-nota">🔒 Compra 100% segura · Acesso imediato após pagamento</p>
</div>

<script>
  var SB_URL = 'https://oijcggqfcgjkgcaymjqx.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pamNnZ3FmY2dqa2djYXltanF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDE0NzcsImV4cCI6MjA4ODMxNzQ3N30.URV7NROQ0wAGG_GzrS2yn2Kksxaefy4v4JJ49yRW51A';

  var DEFAULTS = {
    topbar:    '🔥 ATENÇÃO: Vagas Limitadas — Garanta Sua Entrada Agora!',
    linha1:    'Descubra Como Faturar R$1.000',
    linha2:    'Por Dia com Delivery',
    btn_texto: 'QUERO FATURAR R$1.000 POR DIA →',
    btn_link:  '#',
    btn_nota:  '🔒 Compra 100% segura · Acesso imediato após pagamento',
    video_id:  '',
    segundos:  5
  };

  var VIDEO_ID  = '';
  var CTA_SECS  = 5;
  var ytPlayer  = null;
  var ctaFired  = false;

  function ytId(input) {
    if (!input) return null;
    input = input.trim();
    var m = input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    if (m) return m[1];
    if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
    return null;
  }

  function mostrarCTA() {
    if (ctaFired) return;
    ctaFired = true;
    var cta = document.getElementById('cta');
    cta.style.display = 'block';
    setTimeout(function() {
      cta.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 200);
  }

  // Usuário toca no botão de som → desmuta
  function ativarSom() {
    if (ytPlayer && ytPlayer.unMute) {
      ytPlayer.unMute();
      ytPlayer.setVolume(100);
    }
    document.getElementById('unmute-btn').style.display = 'none';
  }

  window.onYouTubeIframeAPIReady = function() {
    if (!VIDEO_ID) return;

    ytPlayer = new YT.Player('yt-iframe', {
      videoId: VIDEO_ID,
      playerVars: {
        autoplay:       1,
        mute:           1,      // MUDO para autoplay funcionar em qualquer browser/mobile
        controls:       0,      // Sem controles
        disablekb:      1,
        fs:             0,
        rel:            0,
        modestbranding: 1,
        iv_load_policy: 3,
        playsinline:    1,
        cc_load_policy: 0
      },
      events: {
        onReady: function(e) {
          e.target.playVideo();
        },
        onStateChange: function(e) {
          // Vídeo começou a tocar de verdade
          if (e.data === YT.PlayerState.PLAYING) {
            // Some o cover
            document.getElementById('play-cover').classList.add('hide');
            // Mostra botão de som
            document.getElementById('unmute-btn').classList.add('show');
            // Inicia contagem do CTA
            if (!ctaFired) {
              setTimeout(mostrarCTA, CTA_SECS * 1000);
            }
          }
          // Impede pause — se pausar, retoma
          if (e.data === YT.PlayerState.PAUSED) {
            setTimeout(function() { e.target.playVideo(); }, 200);
          }
        }
      }
    });
  };

  function aplicar(cfg) {
    var linha1 = cfg.linha1 || DEFAULTS.linha1;
    var linha2 = cfg.linha2 || DEFAULTS.linha2;

    document.getElementById('vsl-topbar').textContent = cfg.topbar || DEFAULTS.topbar;
    document.getElementById('vsl-titulo').innerHTML   = linha1 + '<br>' + linha2;
    document.getElementById('vsl-btn').textContent    = cfg.btn_texto || DEFAULTS.btn_texto;
    document.getElementById('vsl-btn').href           = cfg.btn_link  || DEFAULTS.btn_link;
    document.getElementById('vsl-nota').textContent   = cfg.btn_nota  || DEFAULTS.btn_nota;
    document.title = linha1 + ' ' + linha2;

    VIDEO_ID = ytId(cfg.video_id || '') || '';
    CTA_SECS = parseInt(cfg.segundos) || 5;

    if (VIDEO_ID) {
      // Thumbnail enquanto o player carrega
      document.getElementById('thumb-img').src =
        'https://img.youtube.com/vi/' + VIDEO_ID + '/hqdefault.jpg';

      // Carrega a YT API (o onYouTubeIframeAPIReady cria o player)
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    } else {
      // Sem vídeo: esconde cover e dispara CTA
      document.getElementById('play-cover').style.display = 'none';
      setTimeout(mostrarCTA, CTA_SECS * 1000);
    }
  }

  fetch(SB_URL + '/rest/v1/vsl_config?id=eq.1&select=*', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(rows) { aplicar(rows && rows.length ? rows[0] : DEFAULTS); })
  .catch(function() { aplicar(DEFAULTS); });
</script>

</body>
</html>
