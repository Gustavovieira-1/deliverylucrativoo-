<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSL</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #E8220A; --orange: #FF6B00; --gold: #FFD700; --dark: #0A0A0A; }
    html, body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

    .topbar {
      background: linear-gradient(90deg, var(--red), var(--orange));
      text-align: center; padding: 9px 16px; font-weight: 700; font-size: 13px;
      animation: pulse-bar 2s ease-in-out infinite;
    }
    @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:.85} }

    .hero { text-align: center; padding: 28px 20px 16px; }
    .hero h1 {
      font-weight: 900; font-size: clamp(22px, 4vw, 46px); line-height: 1.2;
      background: linear-gradient(90deg, var(--orange), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .video-section { max-width: 820px; margin: 0 auto; padding: 16px 16px 0; }
    .video-wrapper {
      position: relative; border-radius: 8px; overflow: hidden;
      box-shadow: 0 0 60px rgba(232,34,10,0.4), 0 0 120px rgba(255,107,0,0.15);
      border: 2px solid rgba(255,107,0,0.35); background: #000;
    }
    .video-wrapper::before { content: ''; display: block; padding-top: 56.25%; }

    #yt-iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
    }

    /* Bloqueador — só ativo após o vídeo iniciar */
    .video-block {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; cursor: default; display: none;
    }

    /* Cover — botão ocupa 100% para garantir toque em qualquer área */
    .play-cover {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; transition: opacity 0.4s ease;
      background: none; border: none; padding: 0; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .play-cover .thumb {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; pointer-events: none;
    }
    .play-cover .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.35); pointer-events: none;
    }
    .play-btn {
      position: relative; z-index: 2; pointer-events: none;
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--orange));
      display: flex; align-items: center; justify-content: center;
      animation: pulse-play 1.6s ease-out infinite;
    }
    .play-btn svg { margin-left: 5px; }
    @keyframes pulse-play {
      0%   { box-shadow: 0 0 0 0 rgba(255,107,0,0.7); }
      70%  { box-shadow: 0 0 0 20px rgba(255,107,0,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,107,0,0); }
    }
    .play-label {
      position: relative; z-index: 2; pointer-events: none;
      font-size: 13px; font-weight: 700; color: #fff;
      letter-spacing: 1px; text-transform: uppercase;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      background: rgba(0,0,0,0.55); padding: 6px 14px; border-radius: 4px;
    }
    .play-cover.hide { opacity: 0; pointer-events: none; }

    .cta-wrap {
      text-align: center; padding: 28px 20px 40px;
      display: none; animation: fadeUp .6s ease forwards;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .btn-cta {
      display: inline-block;
      background: linear-gradient(135deg, var(--red), var(--orange));
      color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: clamp(15px, 2.5vw, 22px); text-decoration: none;
      padding: 20px 40px; border-radius: 6px;
      animation: glow-btn 2.2s ease-in-out infinite; transition: transform .15s;
    }
    @keyframes glow-btn {
      0%,100%{box-shadow:0 8px 32px rgba(255,107,0,0.45)}
      50%{box-shadow:0 8px 52px rgba(255,107,0,0.8),0 0 80px rgba(232,34,10,0.35)}
    }
    .btn-cta:hover { transform: translateY(-2px) scale(1.02); }
    .cta-note { margin-top: 12px; font-size: 12px; color: #777; font-weight: 600; }
    @media(max-width:600px){ .btn-cta { padding: 18px 24px; width: 100%; max-width: 340px; } }
  </style>
</head>
<body>

<div class="topbar" id="vsl-topbar">🔥 ATENÇÃO: Vagas Limitadas — Garanta Sua Entrada Agora!</div>

<section class="hero">
  <h1 id="vsl-titulo">Descubra Como Faturar R$1.000<br>Por Dia com Delivery</h1>
</section>

<section class="video-section">
  <div class="video-wrapper">
    <iframe id="yt-iframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <!-- Ativado APÓS o vídeo iniciar para bloquear pause/seek -->
    <div class="video-block" id="video-block"></div>

    <!-- BUTTON (não div) garante toque no iOS/Android -->
    <button class="play-cover" id="play-cover" onclick="iniciarVideo()" type="button">
      <img class="thumb" id="thumb-img" src="" alt="">
      <div class="overlay"></div>
      <div class="play-btn">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <div class="play-label">▶ Assistir agora</div>
    </button>
  </div>
</section>

<div class="cta-wrap" id="cta">
  <a class="btn-cta" id="vsl-btn" href="#" target="_blank">QUERO FATURAR R$1.000 POR DIA →</a>
  <p class="cta-note" id="vsl-nota">🔒 Compra 100% segura · Acesso imediato após pagamento</p>
</div>

<script>
  var SB_URL = 'https://oijcggqfcgjkgcaymjqx.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pamNnZ3FmY2dqa2djYXltanF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDE0NzcsImV4cCI6MjA4ODMxNzQ3N30.URV7NROQ0wAGG_GzrS2yn2Kksxaefy4v4JJ49yRW51A';

  var DEFAULTS = {
    topbar:'🔥 ATENÇÃO: Vagas Limitadas — Garanta Sua Entrada Agora!',
    linha1:'Descubra Como Faturar R$1.000', linha2:'Por Dia com Delivery',
    btn_texto:'QUERO FATURAR R$1.000 POR DIA →', btn_link:'#',
    btn_nota:'🔒 Compra 100% segura · Acesso imediato após pagamento',
    video_id:'', segundos:5
  };

  var VIDEO_ID = '';
  var CTA_SECS = 5;
  var ctaShown = false;

  function ytId(input) {
    if (!input) return null;
    input = input.trim();
    var m = input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    if (m) return m[1];
    if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
    return null;
  }

  function mostrarCTA() {
    if (ctaShown) return;
    ctaShown = true;
    var cta = document.getElementById('cta');
    cta.style.display = 'block';
    setTimeout(function() { cta.scrollIntoView({ behavior:'smooth', block:'center' }); }, 150);
  }

  function iniciarVideo() {
    if (!VIDEO_ID) return;

    // Some cover imediatamente — feedback instantâneo ao toque
    var cover = document.getElementById('play-cover');
    cover.classList.add('hide');

    // Monta src — com som (gesto do usuário garante isso)
    var src = 'https://www.youtube.com/embed/' + VIDEO_ID
      + '?autoplay=1&mute=0&controls=0'
      + '&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1&fs=0'
      + '&enablejsapi=1';

    document.getElementById('yt-iframe').src = src;

    // Ativa bloqueador de pause/seek após 800ms (tempo de carregar)
    setTimeout(function() {
      document.getElementById('video-block').style.display = 'block';
    }, 800);

    // CTA
    setTimeout(mostrarCTA, CTA_SECS * 1000);

    // Anti-pause via postMessage
    window.addEventListener('message', function(e) {
      var data;
      try { data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; } catch(err) { return; }
      var state = (data.info && data.info.playerState != null) ? data.info.playerState : data.info;
      if (state === 2) {
        var iframe = document.getElementById('yt-iframe');
        if (iframe && iframe.contentWindow) {
          iframe.contentWindow.postMessage(JSON.stringify({ event:'command', func:'playVideo', args:[] }), '*');
        }
      }
    });
  }

  function aplicar(cfg) {
    var linha1 = cfg.linha1 || DEFAULTS.linha1;
    var linha2 = cfg.linha2 || DEFAULTS.linha2;
    document.getElementById('vsl-topbar').textContent = cfg.topbar    || DEFAULTS.topbar;
    document.getElementById('vsl-titulo').innerHTML   = linha1 + '<br>' + linha2;
    document.getElementById('vsl-btn').textContent    = cfg.btn_texto || DEFAULTS.btn_texto;
    document.getElementById('vsl-btn').href           = cfg.btn_link  || DEFAULTS.btn_link;
    document.getElementById('vsl-nota').textContent   = cfg.btn_nota  || DEFAULTS.btn_nota;
    document.title = linha1 + ' ' + linha2;

    VIDEO_ID = ytId(cfg.video_id || '') || '';
    CTA_SECS = parseInt(cfg.segundos) || 5;

    if (VIDEO_ID) {
      var img = document.getElementById('thumb-img');
      img.src = 'https://img.youtube.com/vi/' + VIDEO_ID + '/maxresdefault.jpg';
      img.onerror = function() {
        this.src = 'https://img.youtube.com/vi/' + VIDEO_ID + '/hqdefault.jpg';
        this.onerror = null;
      };
    } else {
      document.getElementById('play-cover').style.display = 'none';
      setTimeout(mostrarCTA, CTA_SECS * 1000);
    }
  }

  fetch(SB_URL + '/rest/v1/vsl_config?id=eq.1&select=*', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(rows) { aplicar(rows && rows.length ? rows[0] : DEFAULTS); })
  .catch(function() { aplicar(DEFAULTS); });
</script>
</body>
</html>
